<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 반려동물 콘텐츠 대시보드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2d3244;
  --text:#e4e6ef;--text2:#9ca0b0;--text3:#6b7089;
  --accent:#3dd6b5;--accent2:#2bb89a;--accent-bg:rgba(61,214,181,.1);
  --orange:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --card-radius:14px;--sidebar-w:280px;
}
body{font-family:'Pretendard',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden;width:100%}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--bg3);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sidebar-header{padding:0 20px 20px;border-bottom:1px solid var(--bg3)}
.sidebar-header h1{font-size:18px;display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{font-size:24px}
.sidebar-stats{padding:16px 20px;border-bottom:1px solid var(--bg3)}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:var(--text2)}
.stat-row .count{color:var(--accent);font-weight:600}
.cat-section{padding:8px 0}
.cat-title{padding:10px 20px;font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;gap:8px}
.cat-title:hover{color:var(--text2)}
.sub-item{padding:8px 20px 8px 36px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.sub-item:hover,.sub-item.active{background:var(--accent-bg);color:var(--accent)}
.sub-item .badge{background:var(--bg4);color:var(--text3);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.sub-item.active .badge{background:var(--accent);color:var(--bg)}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;overflow-x:hidden;max-width:calc(100vw - var(--sidebar-w))}
.topbar{padding:20px 28px;border-bottom:1px solid var(--bg3);background:var(--bg);position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;background:var(--bg3);border:none;border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn:hover{background:var(--bg4);color:var(--text)}
.filter-btn.active{background:var(--accent);color:var(--bg);font-weight:600}

/* CONTENT */
.content{padding:24px 28px}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title .count-badge{background:var(--accent-bg);color:var(--accent);font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600}

/* TREND SECTION */
.trend-section{margin-bottom:32px}
.trend-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.trend-card{min-width:220px;max-width:220px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--bg4);border-radius:var(--card-radius);padding:16px;cursor:pointer;transition:all .2s;flex-shrink:0}
.trend-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.trend-rank{font-size:28px;font-weight:800;color:var(--accent);opacity:.5;line-height:1}
.trend-title{font-size:13px;font-weight:600;margin-top:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.trend-score{margin-top:8px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.trend-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.trend-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .5s}

/* TOPIC GRID */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.topic-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--card-radius);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.topic-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue));opacity:0;transition:opacity .2s}
.topic-card:hover::before{opacity:1}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.card-animal{font-size:20px}
.card-title{font-size:14px;font-weight:700;line-height:1.5;flex:1}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag{padding:3px 8px;background:var(--bg3);border-radius:6px;font-size:10px;color:var(--text2)}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.diff-badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600}
.diff-basic{background:rgba(59,130,246,.15);color:var(--blue)}
.diff-intermediate{background:rgba(245,158,11,.15);color:var(--orange)}
.diff-advanced{background:rgba(139,92,246,.15);color:var(--purple)}
.viral-score{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.viral-bar{width:60px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.viral-fill{height:100%;border-radius:2px}
.viral-high{background:var(--accent)}
.viral-med{background:var(--orange)}
.viral-low{background:var(--text3)}
.cat-badge{font-size:10px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--bg3)}

/* MOBILE MENU */
.mobile-menu-btn{display:none;align-items:center;justify-content:center;width:40px;height:40px;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;cursor:pointer;font-size:20px;color:var(--text);flex-shrink:0;-webkit-tap-highlight-color:transparent}
.mobile-menu-btn:hover{background:var(--bg3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;max-width:780px;width:100%;max-height:85vh;overflow-y:auto;padding:32px}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:20px;margin-bottom:8px;line-height:1.5;padding-right:32px}
.modal .modal-cat{font-size:12px;color:var(--accent);margin-bottom:8px}
.modal .modal-source{font-size:11px;color:var(--text3);margin-bottom:12px;padding:8px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent)}
.modal .modal-desc{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:20px}
.modal .modal-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.modal .modal-tags{display:flex;flex-wrap:wrap;gap:6px}
.modal .modal-tags .tag{font-size:12px;padding:4px 12px}
.ref-excerpt{font-size:12px;color:var(--text2);font-style:italic;margin-top:6px;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid var(--bg4)}
.fulltext-toggle{background:var(--accent);color:var(--bg);border:none;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;margin-top:12px;transition:all .2s}
.fulltext-toggle:hover{background:var(--accent2)}
.modal .viral-big{display:flex;align-items:center;gap:8px;margin-top:16px;padding:16px;background:var(--bg3);border-radius:10px}
.modal .viral-big-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.modal .viral-big-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:4px}
.modal .viral-big-text{font-size:24px;font-weight:800;color:var(--accent)}

/* MODAL TABS */
.modal-tabs{display:flex;gap:4px;margin:20px 0 16px;border-bottom:1px solid var(--bg3);padding-bottom:0}
.modal-tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.modal-tab:hover{color:var(--text2)}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MODAL CONTENT SECTIONS */
.modal-section{display:none}
.modal-section.active{display:block}
.modal-summary{font-size:14px;color:var(--text2);line-height:1.9;padding:16px 0}
.modal-summary h3{font-size:15px;font-weight:700;color:var(--text);margin:20px 0 10px}
.modal-summary h3:first-child{margin-top:0}
.modal-summary p{margin-bottom:12px}
.modal-summary ul{padding-left:20px;margin-bottom:12px}
.modal-summary li{margin-bottom:6px;line-height:1.7}
.modal-fulltext{font-size:14px;color:var(--text2);line-height:2;padding:16px 0;white-space:pre-wrap}
.modal-fulltext h3{font-size:15px;font-weight:700;color:var(--text);margin:24px 0 12px}
.modal-fulltext h3:first-child{margin-top:0}
.modal-fulltext p{margin-bottom:14px}

/* REFERENCES */
.modal-refs{padding:16px 0}
.ref-item{display:flex;gap:12px;padding:12px 16px;background:var(--bg3);border-radius:10px;margin-bottom:8px;align-items:flex-start}
.ref-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.ref-body{flex:1}
.ref-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.ref-source{font-size:11px;color:var(--text3)}
.ref-link{font-size:11px;color:var(--accent);text-decoration:none;word-break:break-all}
.ref-link:hover{text-decoration:underline}
/* USED BADGE */
.topic-card.topic-used{opacity:.65;border-color:var(--bg4)}
.topic-card.topic-used:hover{opacity:.85}
.used-badge{position:absolute;top:12px;right:12px;background:rgba(61,214,181,.2);color:var(--accent);font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;border:1px solid rgba(61,214,181,.3)}
.used-toggle{margin:16px 0 0}
.used-toggle-btn{width:100%;padding:12px;border:1px dashed var(--bg4);border-radius:10px;background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.used-toggle-btn:hover{border-color:var(--accent);color:var(--text)}
.used-toggle-btn.is-used{background:rgba(61,214,181,.1);border-color:var(--accent);color:var(--accent);border-style:solid}

/* PUBLICATION BADGE */
.pub-badge{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:4px;background:rgba(61,214,181,.15);color:var(--accent);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid rgba(61,214,181,.25);z-index:1}
.pub-icons{display:flex;gap:2px;margin-left:4px}
.pub-icon{font-size:10px}
/* 발행 성과 섹션 (모달) */
.pub-section{margin-top:20px;padding:20px;background:var(--bg3);border-radius:12px}
.pub-section h4{font-size:14px;margin-bottom:12px;color:var(--text)}
.pub-table{width:100%;border-collapse:collapse;margin-bottom:12px}
.pub-table th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--bg4)}
.pub-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--bg4)}
.pub-table .num{text-align:right;font-variant-numeric:tabular-nums}
.pub-add-btn{background:var(--accent);color:var(--bg);border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.pub-add-btn:hover{background:var(--accent2)}
.pub-form{margin-top:12px;padding:16px;background:var(--bg);border-radius:8px;display:none}
.pub-form.show{display:block}
.pub-form label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;margin-top:10px}
.pub-form label:first-child{margin-top:0}
.pub-form select,.pub-form input{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--bg4);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.pub-form select:focus,.pub-form input:focus{border-color:var(--accent)}
.pub-form-actions{display:flex;gap:8px;margin-top:12px}
.btn-sm{padding:6px 14px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm-primary{background:var(--accent);color:var(--bg)}
.btn-sm-ghost{background:var(--bg4);color:var(--text2)}
.platform-mini{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.plat-naver-blog{background:rgba(3,199,90,.15);color:#03c75a}
.plat-instagram{background:rgba(225,48,108,.15);color:#e1306c}
.plat-youtube{background:rgba(255,0,0,.15);color:#ff0000}

.no-content{text-align:center;padding:40px 20px;color:var(--text3)}
.no-content-icon{font-size:36px;margin-bottom:12px}
.no-content-text{font-size:13px;line-height:1.6}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px}

/* RESPONSIVE */
@media(max-width:1200px){
  .topic-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .trend-card{min-width:190px;max-width:190px}
}
@media(max-width:1024px){
  .sidebar{transform:translateX(-100%);transition:transform .3s ease}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0;max-width:100vw}
  .mobile-menu-btn{display:flex!important}
  .topbar{padding:16px 20px}
  .content{padding:20px}
  .topic-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .trend-card{min-width:170px;max-width:170px;padding:14px}
}
@media(max-width:768px){
  .topbar{flex-direction:column;gap:10px;padding:14px 16px}
  .search-box{min-width:100%;width:100%}
  .filter-group{width:100%;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .filter-btn{white-space:nowrap;flex-shrink:0}
  .content{padding:16px}
  .topic-grid{grid-template-columns:1fr 1fr;gap:10px}
  .topic-card{padding:16px}
  .card-title{font-size:13px}
  .card-desc{font-size:11px;-webkit-line-clamp:2}
  .trend-section{margin-bottom:24px}
  .trend-scroll{gap:10px}
  .trend-card{min-width:160px;max-width:160px;padding:12px}
  .trend-rank{font-size:22px}
  .trend-title{font-size:12px}
  .section-title{font-size:14px;margin-bottom:12px}
  .modal-overlay{padding:0}
  .modal{padding:20px;margin:0;max-height:100vh;max-width:100%;border-radius:0;height:100vh}
  .modal h2{font-size:16px}
  .modal-fulltext{font-size:13px;line-height:1.8}
  .modal-summary{font-size:13px;line-height:1.8}
}
@media(max-width:480px){
  .topbar{padding:12px;gap:8px}
  .content{padding:10px}
  .topic-grid{grid-template-columns:1fr;gap:8px}
  .topic-card{padding:14px}
  .card-title{font-size:14px}
  .card-desc{font-size:12px;-webkit-line-clamp:3}
  .card-footer{flex-wrap:wrap;gap:6px}
  .trend-card{min-width:140px;max-width:140px;padding:10px}
  .trend-rank{font-size:20px}
  .trend-title{font-size:11px;-webkit-line-clamp:2}
  .card-tags .tag{font-size:9px;padding:2px 6px}
  .modal{padding:16px;margin:0;border-radius:0}
  .modal-tabs{gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal-tab{padding:8px 12px;font-size:12px;white-space:nowrap}
  .filter-btn{padding:6px 10px;font-size:11px}
  .search-box input{padding:8px 12px 8px 36px;font-size:13px}
  .section-title{font-size:13px}
  .trend-scroll{padding-bottom:12px}
  .modal-meta{gap:8px}
  .viral-big{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1><span>🐾</span> 콘텐츠 DB</h1>
  </div>
  <div style="padding:8px 0;border-bottom:1px solid var(--bg3)">
    <a href="/" style="display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;border-left:3px solid var(--accent);background:var(--accent-bg)">🐾 콘텐츠 DB</a>
    <a href="/performance.html" style="display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--text2);text-decoration:none;border-left:3px solid transparent">📊 성과 대시보드</a>
  </div>
  <div class="sidebar-stats" id="sidebarStats"></div>
  <div id="categoryTree"></div>
</aside>

<main class="main">
  <div class="topbar">
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">☰</button>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="주제 검색... (제목, 설명, 태그)">
    </div>
    <div class="filter-group" id="animalFilters">
      <button class="filter-btn active" data-animal="all">전체</button>
      <button class="filter-btn" data-animal="dog">🐕 강아지</button>
      <button class="filter-btn" data-animal="cat">🐈 고양이</button>
    </div>
    <div class="filter-group" id="diffFilters">
      <button class="filter-btn active" data-diff="all">전체</button>
      <button class="filter-btn" data-diff="basic">기초</button>
      <button class="filter-btn" data-diff="intermediate">중급</button>
      <button class="filter-btn" data-diff="advanced">전문</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-sort="viral" id="sortViral">🔥 바이럴순</button>
      <button class="filter-btn" data-sort="alpha" id="sortAlpha">가나다순</button>
    </div>
    <div class="filter-group" id="pubFilters">
      <button class="filter-btn active" data-pub="all">전체</button>
      <button class="filter-btn" data-pub="unpublished">📋 미활용</button>
      <button class="filter-btn" data-pub="published">✅ 발행됨</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-used="all" id="filterAll">전체</button>
      <button class="filter-btn" data-used="unused" id="filterUnused">📋 미사용</button>
      <button class="filter-btn" data-used="used" id="filterUsed">✅ 활용완료</button>
    </div>
  </div>

  <div class="content">
    <div class="trend-section">
      <div class="section-title">🔥 트렌드 추천 TOP 10</div>
      <div class="trend-scroll" id="trendScroll"></div>
    </div>

    <div class="section-title">
      📋 전체 주제 <span class="count-badge" id="totalCount">0</span>
    </div>
    <div class="topic-grid" id="topicGrid"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="empty-icon">🔍</div>
      <div>검색 결과가 없습니다</div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle"></h2>
    <div class="modal-cat" id="modalCat"></div>
    <div class="modal-source" id="modalSource"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-tags" id="modalTags"></div>
    <div class="viral-big">
      <div>바이럴 스코어</div>
      <div class="viral-big-bar"><div class="viral-big-fill" id="modalViralBar"></div></div>
      <div class="viral-big-text" id="modalViralText"></div>
    </div>

    <div class="used-toggle" id="usedToggle"></div>

    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('summary')">📋 요약</button>
      <button class="modal-tab" onclick="switchTab('fulltext')">📖 전문</button>
      <button class="modal-tab" onclick="switchTab('refs')">📚 레퍼런스</button>
      <button class="modal-tab" onclick="switchTab('publish')">📊 발행 성과</button>
    </div>

    <div class="modal-section active" id="tabSummary">
      <div class="modal-summary" id="modalSummary"></div>
    </div>
    <div class="modal-section" id="tabFulltext">
      <div class="modal-fulltext" id="modalFulltext"></div>
    </div>
    <div class="modal-section" id="tabRefs">
      <div class="modal-refs" id="modalRefs"></div>
    </div>
    <div class="modal-section" id="tabPublish">
      <div id="modalPublish"></div>
    </div>
  </div>
</div>

<script>
// 모바일 메뉴 토글
function toggleMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
  document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
}
// 사이드바 항목 클릭 시 모바일에서 자동 닫기
document.addEventListener('click', function(e) {
  if (e.target.closest('.sub-item') || e.target.closest('.cat-title')) {
    if (window.innerWidth <= 1024) {
      setTimeout(toggleMobileMenu, 200);
    }
  }
});

const state = { q: '', animal: 'all', difficulty: 'all', sort: 'viral', subcategory: null, category: null, usedFilter: 'all', pubFilter: 'all' };
// 활용 기록 로컬스토리지 관리
function getUsedTopics() { try { return JSON.parse(localStorage.getItem('usedTopics') || '{}'); } catch { return {}; } }
function setTopicUsed(title, used) { const data = getUsedTopics(); if (used) { data[title] = { usedAt: new Date().toISOString(), note: '' }; } else { delete data[title]; } localStorage.setItem('usedTopics', JSON.stringify(data)); }
function isTopicUsed(title) { return !!getUsedTopics()[title]; }
const animalIcon = { dog: '🐕', cat: '🐈', both: '🐾' };
const diffLabel = { basic: '기초', intermediate: '중급', advanced: '전문' };
const platformIcons = { 'naver-blog': '📗', 'instagram': '📸', 'youtube': '🎬', 'tiktok': '🎵' };
let accountsList = []; // 계정 목록 캐시

async function fetchJSON(url) { return (await fetch(url)).json(); }

async function init() {
  const [cats, trends, stats, accs] = await Promise.all([
    fetchJSON('/api/categories'),
    fetchJSON('/api/trends'),
    fetchJSON('/api/stats'),
    fetchJSON('/api/accounts')
  ]);
  accountsList = accs.accounts || [];
  renderSidebar(cats, stats);
  renderTrends(trends);
  loadTopics();
}

function renderSidebar(cats, stats) {
  const statsEl = document.getElementById('sidebarStats');
  statsEl.innerHTML = `<div class="stat-row"><span>전체 주제</span><span class="count">${stats.total}</span></div>` +
    Object.entries(stats.categories).map(([k,v]) => `<div class="stat-row"><span>${k}</span><span class="count">${v}</span></div>`).join('');
  
  const tree = document.getElementById('categoryTree');
  tree.innerHTML = cats.map(c => `
    <div class="cat-section">
      <div class="cat-title" onclick="filterCategory('${c.id}')">${c.icon} ${c.name}</div>
      ${c.subcategories.map(s => `
        <div class="sub-item" data-sub="${s.id}" onclick="filterSub('${s.id}','${c.id}')">
          <span>${s.icon} ${s.name}</span>
          <span class="badge">${s.count}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderTrends(trends) {
  const el = document.getElementById('trendScroll');
  el.innerHTML = trends.map((t, i) => `
    <div class="trend-card" onclick='showModal(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
      <div class="trend-rank">#${i+1}</div>
      <div class="trend-title">${t.title}</div>
      <div class="trend-score">
        ${animalIcon[t.animal]} ${t.subcategoryName}
        <div class="trend-bar"><div class="trend-bar-fill" style="width:${t.viralScore}%"></div></div>
        ${t.viralScore}
      </div>
    </div>
  `).join('');
}

async function loadTopics() {
  const params = new URLSearchParams();
  if (state.q) params.set('q', state.q);
  if (state.animal !== 'all') params.set('animal', state.animal);
  if (state.difficulty !== 'all') params.set('difficulty', state.difficulty);
  if (state.subcategory) params.set('subcategory', state.subcategory);
  if (state.category) params.set('category', state.category);
  params.set('sort', state.sort);

  const data = await fetchJSON('/api/topics?' + params);
  // 활용 필터 적용 (클라이언트 측)
  if (state.usedFilter === 'used') {
    data.topics = data.topics.filter(t => isTopicUsed(t.title));
  } else if (state.usedFilter === 'unused') {
    data.topics = data.topics.filter(t => !isTopicUsed(t.title));
  }
  data.total = data.topics.length;
  document.getElementById('totalCount').textContent = data.total;
  const grid = document.getElementById('topicGrid');
  const empty = document.getElementById('emptyState');

  // 발행 상태 필터
  if (state.pubFilter === 'published') {
    data.topics = data.topics.filter(t => t.publications && t.publications.length > 0);
  } else if (state.pubFilter === 'unpublished') {
    data.topics = data.topics.filter(t => !t.publications || t.publications.length === 0);
  }
  data.total = data.topics.length;
  document.getElementById('totalCount').textContent = data.total;

  if (data.topics.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = data.topics.map(t => {
    const vClass = t.viralScore >= 85 ? 'viral-high' : t.viralScore >= 70 ? 'viral-med' : 'viral-low';
    const used = isTopicUsed(t.title);
    const pubs = t.publications || [];
    const hasPublications = pubs.length > 0;
    const pubBadge = hasPublications ? `<div class="pub-badge">✅ 발행됨<span class="pub-icons">${pubs.map(p => `<span class="pub-icon">${platformIcons[p.platform] || '🌐'}</span>`).join('')}</span></div>` : '';
    return `
    <div class="topic-card ${used ? 'topic-used' : ''}" onclick='showModal(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
      ${pubBadge}
      ${!hasPublications && used ? '<div class="used-badge">✅ 활용완료</div>' : ''}
      <div class="card-header">
        <div class="card-title">${t.title}</div>
        <div class="card-animal">${animalIcon[t.animal]}</div>
      </div>
      <div class="card-desc">${t.description}</div>
      <div class="card-tags">${t.tags.slice(0,4).map(tag => `<span class="tag">#${tag}</span>`).join('')}</div>
      <div class="card-footer">
        <span class="diff-badge diff-${t.difficulty}">${diffLabel[t.difficulty]}</span>
        <div class="viral-score">
          🔥 <div class="viral-bar"><div class="viral-fill ${vClass}" style="width:${t.viralScore}%"></div></div> ${t.viralScore}
        </div>
      </div>
      <div class="cat-badge">${t.categoryIcon} ${t.categoryName} > ${t.subcategoryName}</div>
    </div>`;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.modal-section').forEach(s => s.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  const tabMap = { summary: 'tabSummary', fulltext: 'tabFulltext', refs: 'tabRefs', publish: 'tabPublish' };
  document.getElementById(tabMap[tab]).classList.add('active');
}

function renderSummary(t) {
  if (t.summary) return t.summary;
  // description을 기반으로 요약 섹션 생성
  let html = `<h3>📌 개요</h3><p>${t.description}</p>`;
  if (t.keyPoints && t.keyPoints.length > 0) {
    html += `<h3>💡 핵심 포인트</h3><ul>${t.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul>`;
  }
  if (t.targetAudience) {
    html += `<h3>🎯 타겟 독자</h3><p>${t.targetAudience}</p>`;
  }
  if (t.cardNewsAngle) {
    html += `<h3>📸 카드뉴스 앵글</h3><p>${t.cardNewsAngle}</p>`;
  }
  return html;
}

function renderFulltext(t) {
  if (t.fullContent) {
    // 긴 콘텐츠인 경우 접기/펼치기 기능 추가 (2000자 이상)
    if (t.fullContent.length > 2000) {
      const preview = t.fullContent.substring(0, 500);
      return `
        <div class="fulltext-content">
          <div class="fulltext-preview" id="fulltextPreview">${preview}...</div>
          <div class="fulltext-full" id="fulltextFull" style="display:none">${t.fullContent}</div>
          <button class="fulltext-toggle" id="fulltextToggle" onclick="toggleFulltext()">📖 전문 보기</button>
        </div>
      `;
    }
    return t.fullContent;
  }
  return `<div class="no-content"><div class="no-content-icon">📝</div><div class="no-content-text">NotebookLM에서 추출 예정입니다.<br>상세 원문은 준비되는 대로 업데이트됩니다.</div></div>`;
}

function renderRefs(t) {
  if (t.references && t.references.length > 0) {
    return t.references.map(r => `
      <div class="ref-item">
        <div class="ref-icon">${r.type === 'paper' ? '📄' : r.type === 'news' ? '📰' : r.type === 'book' ? '📕' : r.type === 'web' ? '🌐' : '📋'}</div>
        <div class="ref-body">
          <div class="ref-title">${r.title}</div>
          <div class="ref-source">${r.source || ''} ${r.year ? `(${r.year})` : ''}</div>
          ${r.url ? `<a class="ref-link" href="${r.url}" target="_blank">${r.url}</a>` : ''}
          ${r.excerpt ? `<div class="ref-excerpt">"${r.excerpt}"</div>` : ''}
        </div>
      </div>
    `).join('');
  }
  return `<div class="no-content"><div class="no-content-icon">📚</div><div class="no-content-text">레퍼런스 정보가 아직 준비되지 않았습니다.<br>전문 자료 기반으로 순차 업데이트 예정입니다.</div></div>`;
}

function showModal(t) {
  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalCat').textContent = `${t.categoryIcon || ''} ${t.categoryName || ''} > ${t.subcategoryIcon || ''} ${t.subcategoryName || ''} | ${animalIcon[t.animal]} ${t.animal === 'dog' ? '강아지' : t.animal === 'cat' ? '고양이' : '공통'}`;
  
  // 소스 정보 표시
  let sourceInfo = '';
  if (t.sourceNotebook || t.sourceDocument) {
    sourceInfo = '📄 출처: ';
    if (t.sourceNotebook) sourceInfo += t.sourceNotebook;
    if (t.sourceDocument) sourceInfo += (t.sourceNotebook ? ' > ' : '') + t.sourceDocument;
  }
  document.getElementById('modalSource').textContent = sourceInfo;
  document.getElementById('modalSource').style.display = sourceInfo ? 'block' : 'none';

  document.getElementById('modalMeta').innerHTML = `
    <span class="diff-badge diff-${t.difficulty}">${diffLabel[t.difficulty]}</span>
    <span style="color:var(--text3);font-size:12px">${t.categoryId || ''} / ${t.subcategoryId || ''}</span>
  `;
  document.getElementById('modalTags').innerHTML = t.tags.map(tag => `<span class="tag">#${tag}</span>`).join('');
  document.getElementById('modalViralBar').style.width = t.viralScore + '%';
  document.getElementById('modalViralText').textContent = t.viralScore;

  // 활용 토글
  const used = isTopicUsed(t.title);
  document.getElementById('usedToggle').innerHTML = `
    <button class="used-toggle-btn ${used ? 'is-used' : ''}" onclick="event.stopPropagation(); toggleUsed('${t.title.replace(/'/g,"\\'")}')">
      ${used ? '✅ 활용완료 — 클릭하여 해제' : '📋 이 주제를 활용완료로 표시'}
    </button>
  `;
  window._currentModalTitle = t.title;

  // 탭 초기화 (요약 탭으로)
  switchTab('summary');

  // 콘텐츠 렌더링
  document.getElementById('modalSummary').innerHTML = renderSummary(t);
  document.getElementById('modalFulltext').innerHTML = renderFulltext(t);
  document.getElementById('modalRefs').innerHTML = renderRefs(t);
  document.getElementById('modalPublish').innerHTML = renderPublish(t);

  // 현재 토픽 위치 저장 (발행 등록용)
  window._currentTopic = t;

  document.getElementById('modal').classList.add('show');
}

function renderPublish(t) {
  const pubs = t.publications || [];
  let html = '<div class="pub-section"><h4>📊 발행 성과</h4>';
  
  if (pubs.length > 0) {
    html += `<table class="pub-table">
      <thead><tr><th>계정</th><th>발행일</th><th class="num">조회수</th><th class="num">좋아요</th><th class="num">댓글</th><th>링크</th></tr></thead>
      <tbody>`;
    for (const p of pubs) {
      const acc = accountsList.find(a => a.id === p.accountId);
      const platClass = 'plat-' + (p.platform || '').replace(/\s/g,'-');
      html += `<tr>
        <td><span class="platform-mini ${platClass}">${platformIcons[p.platform] || '🌐'} ${acc ? acc.name : p.accountId}</span></td>
        <td>${p.publishedAt ? new Date(p.publishedAt).toLocaleDateString('ko') : '-'}</td>
        <td class="num">${(p.metrics?.views || 0).toLocaleString()}</td>
        <td class="num">${(p.metrics?.likes || 0).toLocaleString()}</td>
        <td class="num">${(p.metrics?.comments || 0).toLocaleString()}</td>
        <td>${p.postUrl ? `<a href="${p.postUrl}" target="_blank" style="color:var(--blue);font-size:11px">🔗</a>` : '-'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
  } else {
    html += '<p style="color:var(--text3);font-size:13px;padding:12px 0">아직 발행 기록이 없습니다.</p>';
  }

  // 발행 기록 추가 폼
  html += `<button class="pub-add-btn" onclick="document.getElementById('pubForm').classList.toggle('show')">+ 발행 기록 추가</button>
  <div class="pub-form" id="pubForm">
    <label>계정</label>
    <select id="pubAccountId">
      ${accountsList.map(a => `<option value="${a.id}">${platformIcons[a.platform] || ''} ${a.name}</option>`).join('')}
    </select>
    <label>게시물 URL</label>
    <input type="text" id="pubPostUrl" placeholder="https://...">
    <label>게시물 ID</label>
    <input type="text" id="pubPostId" placeholder="게시물 고유 ID">
    <div class="pub-form-actions">
      <button class="btn-sm btn-sm-ghost" onclick="document.getElementById('pubForm').classList.remove('show')">취소</button>
      <button class="btn-sm btn-sm-primary" onclick="submitPublish()">등록</button>
    </div>
  </div>`;

  html += '</div>';
  return html;
}

async function submitPublish() {
  const t = window._currentTopic;
  if (!t) return;
  const accountId = document.getElementById('pubAccountId').value;
  const postUrl = document.getElementById('pubPostUrl').value.trim();
  const postId = document.getElementById('pubPostId').value.trim();
  if (!accountId) { alert('계정을 선택해주세요'); return; }

  try {
    const res = await fetch(`/api/topics/${t.categoryId}/${t.subcategoryId}/${t._index}/publish`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accountId, postUrl, postId, publishedAt: new Date().toISOString() })
    });
    if (!res.ok) { const e = await res.json(); alert(e.error || '등록 실패'); return; }
    alert('발행 기록이 등록되었습니다!');
    closeModal();
    loadTopics();
  } catch (e) {
    alert('오류: ' + e.message);
  }

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function toggleFulltext() {
  const preview = document.getElementById('fulltextPreview');
  const full = document.getElementById('fulltextFull');
  const toggle = document.getElementById('fulltextToggle');
  
  if (full.style.display === 'none') {
    preview.style.display = 'none';
    full.style.display = 'block';
    toggle.textContent = '📖 접기';
  } else {
    preview.style.display = 'block';
    full.style.display = 'none';
    toggle.textContent = '📖 전문 보기';
  }
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// SEARCH
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.q = e.target.value; loadTopics(); }, 300);
});

// FILTERS
document.getElementById('animalFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#animalFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.animal = btn.dataset.animal;
  loadTopics();
});

document.getElementById('diffFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#diffFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.difficulty = btn.dataset.diff;
  loadTopics();
});

document.getElementById('sortViral').addEventListener('click', () => {
  state.sort = 'viral';
  document.getElementById('sortViral').classList.add('active');
  document.getElementById('sortAlpha').classList.remove('active');
  loadTopics();
});
document.getElementById('sortAlpha').addEventListener('click', () => {
  state.sort = 'alpha';
  document.getElementById('sortAlpha').classList.add('active');
  document.getElementById('sortViral').classList.remove('active');
  loadTopics();
});

function toggleUsed(title) {
  const used = isTopicUsed(title);
  setTopicUsed(title, !used);
  // 모달 토글 업데이트
  const btn = document.querySelector('.used-toggle-btn');
  if (btn) {
    btn.classList.toggle('is-used');
    btn.textContent = !used ? '✅ 활용완료 — 클릭하여 해제' : '📋 이 주제를 활용완료로 표시';
  }
  loadTopics();
}

// 활용 필터
document.getElementById('filterAll').addEventListener('click', () => { state.usedFilter='all'; document.querySelectorAll('[data-used]').forEach(b=>b.classList.remove('active')); document.getElementById('filterAll').classList.add('active'); loadTopics(); });
document.getElementById('filterUnused').addEventListener('click', () => { state.usedFilter='unused'; document.querySelectorAll('[data-used]').forEach(b=>b.classList.remove('active')); document.getElementById('filterUnused').classList.add('active'); loadTopics(); });
document.getElementById('filterUsed').addEventListener('click', () => { state.usedFilter='used'; document.querySelectorAll('[data-used]').forEach(b=>b.classList.remove('active')); document.getElementById('filterUsed').classList.add('active'); loadTopics(); });

// 발행 상태 필터
document.getElementById('pubFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#pubFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.pubFilter = btn.dataset.pub;
  loadTopics();
});

function filterSub(subId, catId) {
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  if (state.subcategory === subId) {
    state.subcategory = null;
    state.category = null;
  } else {
    state.subcategory = subId;
    state.category = catId;
    document.querySelector(`[data-sub="${subId}"]`)?.classList.add('active');
  }
  loadTopics();
}

function filterCategory(catId) {
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  if (state.category === catId && !state.subcategory) {
    state.category = null;
  } else {
    state.category = catId;
    state.subcategory = null;
  }
  loadTopics();
}

init();
</script>
</body>
</html>
